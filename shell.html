<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Inventory PWA</title>
  <link rel="icon" type="image/png" href="./icons/favicon.png">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/logo-192.png">
  <meta name="theme-color" content="#28a745">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* Full-screen iframe container */
    #frame-container {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* Each page frame — hidden by default, full screen when active */
    .page-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: none;
    }

    .page-frame.active {
      display: block;
    }

    /* Loading overlay shown on first paint */
    #shell-loader {
      position: fixed;
      inset: 0;
      background: #f8f9fa;
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      transition: opacity 0.4s ease;
    }

    #shell-loader.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .loader-spinner {
      width: 3rem;
      height: 3rem;
      border: 4px solid #e2e8f0;
      border-top-color: #0d6efd;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #shell-loader p {
      color: #6c757d;
      font-size: 0.95rem;
      font-family: system-ui, -apple-system, sans-serif;
    }
  </style>
</head>

<body>

  <!-- Loading overlay — fades out once inventory page signals ready -->
  <div id="shell-loader">
    <div class="loader-spinner"></div>
    <p>Loading...</p>
  </div>

  <!-- All pages live here as iframes — loaded once, never reloaded on navigation -->
  <div id="frame-container">
    <iframe id="frame-inventory" class="page-frame active" src="index.html"    title="Inventory"></iframe>
    <iframe id="frame-admin"     class="page-frame"        src="admin.html"   title="Admin Dashboard"></iframe>
    <iframe id="frame-tracker"   class="page-frame"        src="tracker.html" title="Shipment Tracker"></iframe>
    <iframe id="frame-settings"  class="page-frame"        src="settings.html" title="Settings"></iframe>
  </div>

  <script>
    // ── State ──────────────────────────────────────────────────────────────────
    const TABS = ['inventory', 'admin', 'tracker', 'settings'];
    let currentTab = 'inventory';

    function setActiveTab(tab) {
      if (!TABS.includes(tab)) tab = 'inventory';
      TABS.forEach((t) => {
        const frame = document.getElementById('frame-' + t);
        if (!frame) return;
        frame.classList.toggle('active', t === tab);
      });
      currentTab = tab;
    }

    // ── Tab Switcher ────────────────────────────────────────────────────────────
    function switchTab(tab, pushHistory = true) {
      if (!TABS.includes(tab)) return;
      if (tab === currentTab) return;

      setActiveTab(tab);

      // Update URL hash so browser back/forward works
      if (pushHistory) {
        history.pushState({ tab }, '', '#' + tab);
      } else if (location.hash !== '#' + tab) {
        history.replaceState({ tab }, '', '#' + tab);
      }
    }

    // ── Browser back/forward support ────────────────────────────────────────────
    window.addEventListener('popstate', e => {
      const tab = (e.state && e.state.tab) || getHashTab();
      switchTab(tab, false);
    });

    // Firefox mobile may emit hashchange without a useful popstate payload.
    window.addEventListener('hashchange', () => {
      switchTab(getHashTab(), false);
    });

    function getHashTab() {
      const h = location.hash.replace('#', '');
      return TABS.includes(h) ? h : 'inventory';
    }

    // ── Restore from URL hash on load ───────────────────────────────────────────
    const initialTab = getHashTab();
    setActiveTab(initialTab);
    history.replaceState({ tab: currentTab }, '', '#' + currentTab);

    // ── postMessage listener — iframes communicate with the shell ───────────────
    window.addEventListener('message', e => {
      if (!e.data || typeof e.data !== 'object') return;

      // Simple tab switch (from nav buttons inside each page)
      if (e.data.switchTab) {
        switchTab(e.data.switchTab);
      }

      // Tracker loaded an operation — relay signal to inventory iframe, then switch
      if (e.data.type === 'loadTrackerOperation') {
        const inventoryFrame = document.getElementById('frame-inventory');
        if (inventoryFrame && inventoryFrame.contentWindow) {
          inventoryFrame.contentWindow.postMessage({ type: 'loadTrackerOperation' }, '*');
        }
        switchTab('inventory');
      }

      // Inventory page auth resolved — hide the loading overlay
      if (e.data.type === 'appReady') {
        const loader = document.getElementById('shell-loader');
        if (loader) {
          loader.classList.add('fade-out');
          setTimeout(() => loader.remove(), 450);
        }
      }
    });

    // ── Fallback: hide loader after 6 seconds regardless ───────────────────────
    setTimeout(() => {
      const loader = document.getElementById('shell-loader');
      if (loader) {
        loader.classList.add('fade-out');
        setTimeout(() => loader.remove(), 450);
      }
    }, 6000);
  </script>

</body>
</html>
